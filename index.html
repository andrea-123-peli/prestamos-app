<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#f59e0b;font-size:20px;font-family:Georgia,serif;">Cargando...</div></div>
<script type="text/babel">
const {useState,useMemo,useEffect}=React;

const EC={activo:{bg:"#d1fae5",text:"#065f46",dot:"#10b981"},pagado:{bg:"#dbeafe",text:"#1e40af",dot:"#3b82f6"},perdida:{bg:"#fee2e2",text:"#991b1b",dot:"#ef4444"},atrasado:{bg:"#fef3c7",text:"#92400e",dot:"#f59e0b"}};
const FREQ=["diario","semanal","quincenal","mensual"];
const EST=["activo","pagado","perdida","atrasado"];
function qR(c){return(c.cuotaPersonalizada&&c.cuotaPersonalizada>0)?c.cuotaPersonalizada:Math.round((c.monto+(c.monto*c.tasa)/100)/c.cuotas);}
function cS(c){
  // Saldo pendiente total (con intereses) - para mostrar en tarjeta
  const q=qR(c);
  const totalAbonado=(c.abonos||[]).reduce((s,a)=>s+a.monto,0);
  const residuoAcum=totalAbonado%q;
  return Math.max(0,q*c.cuotas-q*c.cuotasPagadas-residuoAcum);
}
function capitalPerdido(c){
  // Solo el capital real no recuperado (sin intereses)
  const capPorCuota=c.monto/c.cuotas;
  const totalAbonado=(c.abonos||[]).reduce((s,a)=>s+a.monto,0);
  const capDevuelto=c.cuotasPagadas*capPorCuota;
  return Math.max(0,c.monto-capDevuelto);
}
function tR(c){return(((qR(c)*c.cuotas-c.monto)/c.monto)*100).toFixed(2);}
function fN(n){if(!n&&n!==0)return"";return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,".");}
function fC(n){return"$ "+fN(n);}
function pN(s){return Number(String(s).replace(/\./g,"").replace(/[^0-9]/g,""));}
function hoy(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
const INP={width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:10,padding:"10px 14px",color:"#f1f5f9",fontSize:14,boxSizing:"border-box",outline:"none"};

const SURL="https://hdbnuzyzoiwihxrohhbn.supabase.co";
const SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkYm51enl6b2l3aWh4cm9oaGJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDYzNDEsImV4cCI6MjA5NDI4MjM0MX0.GBQDjGED1lmZ5AAnWtMZaUAB47AmzaY_71zcaPAUP60";
const sb=supabase.createClient(SURL,SKEY);
const MEM={};
async function dbGet(k){try{const{data}=await sb.from("prestamos_data").select("data").eq("id",k).single();return data?data.data:null;}catch(e){return null;}}
async function dbSet(k,v){try{await sb.from("prestamos_data").upsert({id:k,data:v,updated_at:new Date().toISOString()});}catch(e){}}
function sSt(k,v){MEM[k]=v;dbSet(k,JSON.parse(v));try{localStorage.setItem("mp_local_"+k,v);}catch(e){}}
function clearSt(k){delete MEM[k];dbSet(k,null);try{localStorage.removeItem("mp_local_"+k);}catch(e){}}
async function gSt(k){
  try{const v=await dbGet(k);if(v!==null&&v!==undefined){const s=JSON.stringify(v);MEM[k]=s;return s;}}catch(e){}
  try{const v=localStorage.getItem("mp_local_"+k);if(v&&v!=="null"){MEM[k]=v;return v;}}catch(e){}
  if(MEM[k]&&MEM[k]!=="null")return MEM[k];return null;
}

function Cartera({ck,nombre,CA,onBack,allTrab,saveTrab}){
  const SK="mp_c_"+ck;
  const CK="mp_ci_"+ck;
  const [cl,setCl]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("dash");
  const [det,setDet]=useState(null);
  const [editC,setEditC]=useState(null);
  const [showMod,setShowMod]=useState(false);
  const [showAb,setShowAb]=useState(false);
  const [showRen,setShowRen]=useState(false);
  const [showPins,setShowPins]=useState(false);
  const [showExp,setShowExp]=useState(false);
  const [showExcel,setShowExcel]=useState(false);
  const [confirmDel,setConfirmDel]=useState(null);
  const [filtFrec,setFiltFrec]=useState(null);
  const [filtDia,setFiltDia]=useState(null);
  const [confirmReset,setConfirmReset]=useState(false);
  const [resetTxt,setResetTxt]=useState("");
  const [ganHist,setGanHist]=useState([]);
  const [capHist,setCapHist]=useState(0);
  const [cierresMes,setCierresMes]=useState([]);
  const [showPagoFinal,setShowPagoFinal]=useState(false);
  const [pagoFinalId,setPagoFinalId]=useState(null);
  const [descuento,setDescuento]=useState("");
  const [excelData,setExcelData]=useState("");
  const [gStats,setGStats]=useState({wStats:{},oStats:null});
  const [abM,setAbM]=useState("");
  const [abN,setAbN]=useState("");
  const [renF,setRenF]=useState({monto:"",tasa:"",frecuencia:"mensual",cuotas:"",fechaInicio:hoy()});
  const [pinD,setPinD]=useState({});
  const [fil,setFil]=useState("todos");
  const [busq,setBusq]=useState("");
  const [hFil,setHFil]=useState({desde:"2026-01",hasta:"2026-12"});
  const [saved,setSaved]=useState(false);
  const [toast,setToast]=useState(null);
  const [impTxt,setImpTxt]=useState("");
  const anio=new Date().getFullYear();
  const EF={nombre:"",monto:"",tasa:"20",frecuencia:"mensual",cuotas:"",cuotaP:"",estado:"activo",fechaInicio:hoy(),yapag:"0",diaCobro:""};
  const [form,setForm]=useState(EF);

  useEffect(()=>{
    (async()=>{
      const rc=await gSt(SK);if(rc)setCl(JSON.parse(rc));
      const rg=await gSt(SK+"_gan");
      if(rg){try{const p=typeof rg==="string"?JSON.parse(rg):rg;if(Array.isArray(p))setGanHist(p);}catch(e){}}
      const rch=await gSt(SK+"_caphist");
      if(rch){try{setCapHist(typeof rch==="string"?JSON.parse(rch):rch);}catch(e){setCapHist(0);}}
      const rcm=await gSt(SK+"_cierres_mes");
      const cierresIni=rcm?JSON.parse(rcm):[];
      setCierresMes(cierresIni);
      // Auto close previous month if needed
      const clIni=rc?JSON.parse(rc):[];
      cerrarMesAutomatico(clIni,cierresIni);
      const rci=await gSt(CK);if(rci)setCi(JSON.parse(rci));
      setLoading(false);
    })();
  },[]);

  function showT(msg){setToast(msg);setTimeout(()=>setToast(null),2500);}

  function cerrarMesAutomatico(clientes,cierresActuales){
    const hoyStr=hoy();
    const mesAnterior=new Date();mesAnterior.setDate(1);mesAnterior.setMonth(mesAnterior.getMonth()-1);
    const labelMes=mesAnterior.getFullYear()+"-"+String(mesAnterior.getMonth()+1).padStart(2,"0");
    // Check if already closed
    if(cierresActuales.find(c=>c.label===labelMes))return cierresActuales;
    // Only close on day 1-3 of month
    const dia=new Date().getDate();
    if(dia>3)return cierresActuales;
    // Calculate stats for last month
    let g=0,p=0,pr=0,atr=0,nAtr=0;
    clientes.forEach(c=>{
      if(c.fechaInicio&&c.fechaInicio.startsWith(labelMes))pr+=c.monto;
         // ganancia via ganHist
      if(c.estado==="perdida"&&c.fechaInicio&&c.fechaInicio.startsWith(labelMes))p+=cS(c);
      if(c.estado==="atrasado"){atr+=cS(c);nAtr++;}
    });
    const cierre={label:labelMes,g:Math.round(g),p:Math.round(p),n:Math.round(g-p),pr:Math.round(pr),atr:Math.round(atr),nAtr,fechaCierre:hoyStr};
    const nuevos=[...cierresActuales,cierre];
    setCierresMes(nuevos);
    sSt(SK+"_cierres_mes",JSON.stringify(nuevos));
    return nuevos;
  }

  function save(u){setCl(u);setSaved(true);setTimeout(()=>setSaved(false),1200);sSt(SK,JSON.stringify(u));}

  function calcStG(cc){
    const p=cc.filter(c=>c.estado==="perdida").reduce((s,c)=>s+capitalPerdido(c),0);
    const cap=cc.reduce((s,c)=>s+c.monto,0)+capHist;
    const capActivo=cc.filter(c=>c.estado==="activo"||c.estado==="atrasado").reduce((s,c)=>s+cS(c),0);
    const atrasD=cc.filter(c=>c.estado==="atrasado").reduce((s,c)=>s+cS(c),0);
    return{perd:Math.round(p),cap,capActivo,atrasD:Math.round(atrasD),
      act:cc.filter(c=>c.estado==="activo").length,
      atr:cc.filter(c=>c.estado==="atrasado").length,
      pag:cc.filter(c=>c.estado==="pagado").length,
      perN:cc.filter(c=>c.estado==="perdida").length,
      total:cc.length};
  }

  async function loadGlobal(){
    if(ck!=="owner"||!allTrab)return;
    try{
      const r=await gSt("mp_c_owner");const os=r?calcStG(JSON.parse(r)):null;
      const ws={};
      await Promise.all((allTrab||[]).filter(t=>t.activo!==false).map(async t=>{
        try{const r2=await gSt("mp_c_worker_"+t.id);if(r2){const s=calcStG(JSON.parse(r2));const com=t.tipo==="porcentaje"?Math.round(s.neta*t.porcentaje/100):t.sueldo||0;ws[t.id]={...s,com,util:Math.round(s.neta-com),nombre:t.nombre,tipo:t.tipo,porcentaje:t.porcentaje,sueldo:t.sueldo};}}catch(e){}
      }));
      setGStats({wStats:ws,oStats:os});
    }catch(e){}
  }

  const stats=useMemo(()=>{
    const st=calcStG(cl);
    const ganTotal=ganHist.reduce((s,g)=>s+g.ganancia,0);
    const perdTotal=cl.filter(c=>c.estado==="perdida").reduce((s,c)=>s+capitalPerdido(c),0);
    const ganFinal=ganTotal-perdTotal;
    const mn=new Date();const mlb=mn.getFullYear()+"-"+String(mn.getMonth()+1).padStart(2,"0");
    // Prestado este mes = monto actual si inicio/renovacion este mes
    // + montos de renovaciones anteriores que ocurrieron este mes
    const capMes=cl.filter(c=>c.fechaInicio&&c.fechaInicio.startsWith(mlb)).reduce((s,c)=>s+c.monto,0);
    const ganAprox=cl.filter(c=>(c.estado==="activo"||c.estado==="atrasado")&&c.fechaInicio&&c.fechaInicio.startsWith(mlb)).reduce((s,c)=>s+(qR(c)*c.cuotas-c.monto),0);
    // Capital en calle sin intereses = monto original - capital devuelto por cuotas pagadas
    const capCalleNeto=cl.filter(c=>c.estado==="activo"||c.estado==="atrasado").reduce((s,c)=>{
      const capPorCuota=c.monto/c.cuotas;
      const totalAb=(c.abonos||[]).reduce((a,ab)=>a+ab.monto,0);
      const capDevuelto=(c.cuotasPorBoton||c.cuotasPagadas)*capPorCuota+(totalAb*(c.monto/(qR(c)*c.cuotas)));
      return s+Math.max(0,c.monto-capDevuelto);
    },0);
    let mg=0;
    // Ganancia del mes viene SOLO de ganHist
    ganHist.filter(g=>g.fecha&&g.fecha.startsWith(mlb)).forEach(g=>{mg+=g.ganancia;});
    // Perdidas de clientes cuyo prestamo inicio este mes
    cl.filter(c=>c.estado==="perdida"&&c.fechaInicio&&c.fechaInicio.startsWith(mlb)).forEach(c=>{
      mg-=capitalPerdido(c);
    });
    const fh=hoy();const ph=[];
    cl.forEach(c=>{
      (c.historialPagos||[]).forEach((f,i)=>{if(f===fh)ph.push({nombre:c.nombre,tipo:"Cuota "+(i+1),monto:qR(c)});});
      (c.abonos||[]).forEach(a=>{if(a.fecha===fh)ph.push({nombre:c.nombre,tipo:"Abono",monto:a.monto});});
    });
    const diasSem=["Domingo","Lunes","Martes","Miercoles","Jueves","Viernes","Sabado"];
    const hoyDia=diasSem[new Date().getDay()];
    const hoyDom=new Date().getDate();
    const cobroHoy=cl.filter(c=>{
      if(!c.diaCobro||c.estado!=="activo")return false;
      if(c.frecuencia==="semanal"){
        if(c.diaCobro!==hoyDia)return false;
        const lun=new Date();lun.setDate(lun.getDate()-lun.getDay()+(lun.getDay()===0?-6:1));
        return !(c.historialPagos||[]).some(f=>f&&f>=lun.toISOString().split("T")[0]);
      }
      if(c.frecuencia==="mensual"){
        if(String(hoyDom)!==String(c.diaCobro))return false;
        return !(c.historialPagos||[]).some(f=>f&&f.startsWith(mlb));
      }
      if(c.frecuencia==="quincenal"){
        const dia=parseInt(c.diaCobro)||15;
        if(hoyDom!==dia&&hoyDom!==1)return false;
        const hace14=new Date();hace14.setDate(hace14.getDate()-14);
        return !(c.historialPagos||[]).some(f=>f&&f>=hace14.toISOString().split("T")[0]);
      }
      if(c.frecuencia==="diario")return !(c.historialPagos||[]).some(f=>f===fh);
      return false;
    });
    return{...st,gan:ganTotal,neta:ganFinal,capMes,capCalleNeto:Math.round(capCalleNeto),mesMonto:Math.round(mg),ganAprox:Math.round(ganAprox),ph,cobroHoy,pag:cl.filter(c=>c.estado==="pagado").length,perN:cl.filter(c=>c.estado==="perdida").length};
  },[cl,ganHist,capHist]);

  const filt=useMemo(()=>cl.filter(c=>(fil==="todos"||c.estado===fil)&&c.nombre.toLowerCase().includes(busq.toLowerCase())).slice().reverse(),[cl,fil,busq]);

  const hD=useMemo(()=>{
    const [dA,dM]=hFil.desde.split("-").map(Number);
    const [hA,hM]=hFil.hasta.split("-").map(Number);
    const ms=[];let y=dA;
    while(y<=hA){
      let m=(y===dA?dM:1);const mEnd=(y===hA?hM:12);
      while(m<=mEnd){
        const label=y+"-"+String(m).padStart(2,"0");
        let g=0,p=0,pr=0;
        let atr=0,nAtr=0;
        cl.forEach(c=>{
          if(c.fechaInicio&&c.fechaInicio.startsWith(label))pr+=c.monto;
          // ganancia via ganHist por fechaInicio
          if(c.estado==="perdida"&&c.fechaInicio&&c.fechaInicio.startsWith(label))p+=capitalPerdido(c);
          if(c.estado==="atrasado"){atr+=cS(c);nAtr++;}
        });
        // Ganancia del mes desde ganHist por fechaInicio
        ganHist.filter(gh=>gh.fecha&&gh.fecha.startsWith(label)).forEach(gh=>{g+=gh.ganancia;});
        ms.push({label,g:Math.round(g),p:Math.round(p),n:Math.round(g-p),pr:Math.round(pr),atr:Math.round(atr),nAtr});
        m++;
      }y++;
    }
    return ms;
  },[cl,hFil]);

  function guardar(){
    const m=pN(form.monto),t=Number(form.tasa),q=Number(form.cuotas);
    if(!form.nombre||!m||!t||!q)return;
    const cp=pN(form.cuotaP)||0;
    const yp=Math.min(q,Number(form.yapag)||0);
    const hp=Array.from({length:yp},()=>form.fechaInicio);
    let u;
    if(editC){
      u=cl.map(c=>{if(c.id!==editC.id)return c;const ep=form.estado==="perdida"&&c.estado!=="perdida";return{...c,nombre:form.nombre,monto:m,tasa:t,frecuencia:form.frecuencia,cuotas:q,cuotaPersonalizada:cp,estado:yp>=q?"pagado":form.estado,fechaInicio:form.fechaInicio,fechaPerdida:ep?hoy():(c.fechaPerdida||null),diaCobro:form.diaCobro||""};});
    }else{
      u=[...cl,{id:Date.now(),nombre:form.nombre,monto:m,tasa:t,frecuencia:form.frecuencia,cuotas:q,cuotaPersonalizada:cp,estado:yp>=q?"pagado":form.estado,fechaInicio:form.fechaInicio,cuotasPagadas:yp,cuotasPorBoton:yp,historialPagos:hp,abonos:[],renovaciones:[],fechaPerdida:null,diaCobro:form.diaCobro||""}];
    }
    save(u);setShowMod(false);setEditC(null);setForm(EF);
  }

  function regPago(id){
    const c0=cl.find(x=>x.id===id);const n0=(c0?c0.cuotasPagadas:0)+1;
    const u=cl.map(c=>{if(c.id!==id||c.cuotasPagadas>=c.cuotas)return c;const n=c.cuotasPagadas+1;return{...c,cuotasPorBoton:(c.cuotasPorBoton||0)+1,cuotasPagadas:n,historialPagos:[...(c.historialPagos||[]),hoy()],estado:n>=c.cuotas?"pagado":c.estado};});
    save(u);if(det&&det.id===id)setDet(u.find(c=>c.id===id));
    const upd=u.find(c=>c.id===id);
    if(upd&&upd.estado==="pagado"){
      const gan=Math.max(0,qR(upd)*upd.cuotas-upd.monto-(upd.descuento||0));
      const nuevaGan=[...ganHist,{id:upd.id+"_p_"+hoy(),clienteId:upd.id,ganancia:gan,fecha:upd.fechaInicio||hoy()}];
      setGanHist(nuevaGan);sSt(SK+"_gan",JSON.stringify(nuevaGan));
      showT("Pagado - "+upd.nombre);
    } else showT("Cuota "+n0+" - "+(c0?c0.nombre:""));
  }

  function regTodo(id){
    setPagoFinalId(id);setDescuento("");setShowPagoFinal(true);
  }

  function confirmarPagoFinal(){
    const id=pagoFinalId;
    const c0=cl.find(x=>x.id===id);
    const desc=pN(descuento)||0;
    const ganReal=Math.max(0,(qR(c0)*c0.cuotas-c0.monto)-desc);
    const u=cl.map(c=>{if(c.id!==id)return c;const h=[...(c.historialPagos||[])];let i=c.cuotasPagadas;while(i<c.cuotas){h.push(hoy());i++;}return{...c,cuotasPagadas:c.cuotas,historialPagos:h,estado:"pagado",descuento:desc};});
    save(u);if(det&&det.id===id)setDet(u.find(c=>c.id===id));
    const upd=u.find(c=>c.id===id);
    if(upd){
      const gan=Math.max(0,qR(upd)*upd.cuotas-upd.monto-desc);
      const nuevaGan=[...ganHist,{id:upd.id+"_pf_"+hoy(),clienteId:upd.id,ganancia:gan,descuento:desc,fecha:upd.fechaInicio||hoy()}];
      setGanHist(nuevaGan);sSt(SK+"_gan",JSON.stringify(nuevaGan));
    }
    setShowPagoFinal(false);setPagoFinalId(null);setDescuento("");
    showT("Pagado - "+(c0?c0.nombre:"")+(desc>0?" (descuento "+fC(desc)+")":""));
  }

  function regAbono(id){
    const monto=pN(abM);if(!monto)return;
    const c0=cl.find(x=>x.id===id);const qv=qR(c0);
    const eraPerdiday=c0.estado==="perdida";
    const u=cl.map(c=>{
      if(c.id!==id)return c;
      const abs=[...(c.abonos||[]),{monto,nota:abN,fecha:hoy()}];
      const totalAbonado=abs.reduce((s,a)=>s+a.monto,0);
      const cuotasDeAbonos=Math.floor(totalAbonado/qv);
      const cuotasPorBoton=c.cuotasPorBoton||0;
      const nq=Math.min(c.cuotas,cuotasPorBoton+cuotasDeAbonos);
      const term=nq>=c.cuotas;
      let est=c.estado,fp=c.fechaPerdida||null;
      if(term)est="pagado";else if(c.estado==="perdida"||c.estado==="atrasado"){est="activo";fp=null;}
      return{...c,abonos:abs,cuotasPagadas:nq,estado:est,fechaPerdida:fp};
    });
    save(u);
    const upd=u.find(c=>c.id===id);
    if(upd&&upd.estado==="pagado"){
      const gan=Math.max(0,qR(upd)*upd.cuotas-upd.monto-(upd.descuento||0));
      const nuevaGan=[...ganHist,{id:upd.id+"_a_"+hoy(),clienteId:upd.id,ganancia:gan,fecha:upd.fechaInicio||hoy()}];
      setGanHist(nuevaGan);sSt(SK+"_gan",JSON.stringify(nuevaGan));
      showT((eraPerdiday?"Recuperado":"Pagado")+" - "+upd.nombre);
    } else showT("Abono - "+(c0?c0.nombre:""));
    if(det&&det.id===id)setDet(u.find(c=>c.id===id));
    setShowAb(false);setAbM("");setAbN("");
  }

  function regRen(id){
    const m=pN(renF.monto),t=Number(renF.tasa),q=Number(renF.cuotas);if(!m||!t||!q)return;
    const c0=cl.find(x=>x.id===id);if(!c0)return;
    // Save ganancia del prestamo anterior a ganHist
    if(c0.estado==="pagado"){
      const ganAnterior=Math.max(0,qR(c0)*c0.cuotas-c0.monto-(c0.descuento||0));
      const nuevaGan=[...ganHist,{id:c0.id+"_ren_"+hoy(),clienteId:c0.id,ganancia:ganAnterior,fecha:c0.fechaInicio||hoy()}];
      setGanHist(nuevaGan);sSt(SK+"_gan",JSON.stringify(nuevaGan));
    }
    // Save old monto to capital historico
    const nuevoCap=capHist+c0.monto;
    setCapHist(nuevoCap);
    sSt(SK+"_caphist",JSON.stringify(nuevoCap));

    const c0=cl.find(x=>x.id===id);

      const gan=Math.max(0,qR(c0)*c0.cuotas-c0.monto-(c0.descuento||0));
      const nuevaGan=[...ganHist,{id:id+"_del_"+hoy(),clienteId:id,nombre:c0.nombre,ganancia:gan,fecha:c0.fechaInicio||hoy()}];
      setGanHist(nuevaGan);
      sSt(SK+"_gan",JSON.stringify(nuevaGan));
      const capCliente=c0.monto+(c0.renovaciones||[]).reduce((a,r)=>a+(r.montoAnterior||0),0);
      const nuevoCap=capHist+capCliente;
      setCapHist(nuevoCap);
      sSt(SK+"_caphist",JSON.stringify(nuevoCap));
    }
    save(cl.filter(c=>c.id!==id));

            </div>
            <div style={{marginBottom:13}}>
              <label style={{fontSize:10,color:"#94a3b8",display:"block",marginBottom:3,fontWeight:600}}>Importar:</label>

              <button onClick={()=>{try{const d=JSON.parse(impTxt);if(d.cl)save(d.cl);setImpTxt("");setShowExp(false);showT("Datos importados");}catch(e){showT("Texto invalido");}}} style={{marginTop:5,background:"#3b82f6",color:"white",border:"none",borderRadius:7,padding:"7px 14px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Importar</button>
            </div>
            <div style={{borderTop:"1px solid #334155",paddingTop:12,marginTop:4}}>
              <div style={{fontSize:11,fontWeight:700,color:"#ef4444",marginBottom:6}}>Zona de peligro</div>
              {!confirmReset
  ? <button onClick={()=>setConfirmReset(true)} style={{width:"100%",background:"#450a0a",color:"#ef4444",border:"1px solid #ef444433",borderRadius:8,padding:"9px",fontWeight:700,cursor:"pointer",fontSize:12,marginBottom:8}}>Borrar TODO</button>
  : <div style={{background:"#450a0a",borderRadius:8,padding:10,marginBottom:8}}>
      <div style={{fontSize:11,color:"#ef4444",marginBottom:6}}>Escribe BORRAR para confirmar:</div>
      <input value={resetTxt} onChange={e=>setResetTxt(e.target.value)} style={{width:"100%",background:"#0f172a",border:"1px solid #ef4444",borderRadius:6,padding:"7px",color:"#ef4444",fontSize:14,boxSizing:"border-box",outline:"none",marginBottom:6}}/>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>{setConfirmReset(false);setResetTxt("");}} style={{flex:1,background:"#334155",color:"#94a3b8",border:"none",borderRadius:6,padding:"7px",fontWeight:600,cursor:"pointer",fontSize:12}}>Cancelar</button>
        <button onClick={()=>{if(resetTxt==="BORRAR"){save([]);setGanHist([]);clearSt(SK+"_gan");setCapHist(0);clearSt(SK+"_caphist");setConfirmReset(false);setResetTxt("");setShowExp(false);showT("Todo borrado");}else showT("Escribe exactamente BORRAR");}} style={{flex:2,background:"#ef4444",color:"white",border:"none",borderRadius:6,padding:"7px",fontWeight:700,cursor:"pointer",fontSize:12}}>Confirmar</button>
      </div>
    </div>
}
            </div>
            <button onClick={()=>setShowExp(false)} style={{width:"100%",background:"#334155",color:"#94a3b8",border:"none",borderRadius:8,padding:"9px",fontWeight:600,cursor:"pointer",fontSize:12}}>Cerrar</button>
          </div>
        </div>
      )}

      {showPagoFinal&&pagoFinalId&&(()=>{
        const c0=cl.find(x=>x.id===pagoFinalId);
        if(!c0)return null;
        const ganBruta=qR(c0)*c0.cuotas-c0.monto;
        const desc=pN(descuento)||0;
        const ganReal=Math.max(0,ganBruta-desc);
        return(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:13}}>
            <div style={{background:"#1e293b",borderRadius:14,padding:18,width:"100%",maxWidth:340,border:"1px solid #10b981"}}>
              <h3 style={{fontSize:15,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>Confirmar Pago Total</h3>
              <p style={{fontSize:11,color:"#64748b",marginBottom:12}}><strong style={{color:"#f1f5f9"}}>{c0.nombre}</strong></p>
              <div style={{background:"#0f172a",borderRadius:8,padding:11,marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:11,color:"#64748b"}}>Ganancia original</span><span style={{fontSize:12,fontWeight:700,color:"#f59e0b"}}>{fC(ganBruta)}</span></div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:11,color:"#64748b"}}>Descuento</span><span style={{fontSize:12,fontWeight:700,color:"#ef4444"}}>-{fC(desc)}</span></div>
                <div style={{height:1,background:"#334155",margin:"6px 0"}}/>
                <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,fontWeight:700,color:"#f1f5f9"}}>Ganancia real</span><span style={{fontSize:14,fontWeight:800,color:"#10b981"}}>{fC(ganReal)}</span></div>
              </div>
              <div style={{marginBottom:12}}>
                <label style={{fontSize:10,color:"#94a3b8",display:"block",marginBottom:4,fontWeight:600}}>Descuento por pago anticipado ($) <span style={{color:"#64748b",fontWeight:400}}>(0 si no hay)</span></label>
                <input type="text" inputMode="numeric" value={descuento} onChange={e=>{const r=pN(e.target.value);setDescuento(r?fN(r):"");}} placeholder="0" style={INP}/>
              </div>
              <div style={{display:"flex",gap:7}}>
                <button onClick={()=>{setShowPagoFinal(false);setPagoFinalId(null);}} style={{flex:1,background:"#334155",color:"#94a3b8",border:"none",borderRadius:8,padding:"9px",fontWeight:600,cursor:"pointer",fontSize:12}}>Cancelar</button>
                <button onClick={confirmarPagoFinal} style={{flex:2,background:"#10b981",color:"white",border:"none",borderRadius:8,padding:"9px",fontWeight:700,cursor:"pointer",fontSize:12}}>Confirmar Pago</button>
              </div>
            </div>
          </div>
        );
      })()}

      {showExcel&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:2000,padding:10,overflowY:"auto"}}>
          <div style={{background:"white",borderRadius:12,width:"100%",maxWidth:700,marginTop:8,marginBottom:8}}>
            <div style={{background:"#1d4ed8",borderRadius:"12px 12px 0 0",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:15,fontWeight:700,color:"white"}}>Planilla de Clientes</div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{
                  const nl=String.fromCharCode(10);
                  let msg="REPORTE DE CLIENTES"+nl+"=================="+nl;
                  cl.forEach(c=>{const q=qR(c),saldo=cS(c);const ganGen=Math.round(((q*c.cuotas-c.monto)/c.cuotas)*(c.historialPagos||[]).filter(f=>f).length);msg+=nl+"Cliente: "+c.nombre+nl+"Estado: "+c.estado.toUpperCase()+nl+"Prestado: "+fC(c.monto)+" | Cuota: "+fC(q)+nl+"Pagadas: "+c.cuotasPagadas+"/"+c.cuotas+" | Saldo: "+fC(saldo)+nl+"Ganancia: "+fC(ganGen)+(c.diaCobro?" | Cobro: "+c.diaCobro:"")+nl+"----------------";});
                  msg+=nl+nl+"TOTALES"+nl+"Capital: "+fC(cl.reduce((s,c)=>s+c.monto,0))+nl+"Saldo pendiente: "+fC(cl.filter(c=>c.estado==="activo"||c.estado==="atrasado").reduce((s,c)=>s+cS(c),0))+nl+"Ganancia acumulada: "+fC(cl.reduce((s,c)=>{const q=qR(c);return s+Math.round(((q*c.cuotas-c.monto)/c.cuotas)*(c.historialPagos||[]).filter(f=>f).length);},0));
                  try{navigator.clipboard.writeText(msg);}catch(e){}
                  showT("Copiado para WhatsApp");
                }} style={{background:"#25d366",color:"white",border:"none",borderRadius:7,padding:"6px 12px",fontWeight:700,cursor:"pointer",fontSize:12}}>Copiar WhatsApp</button>
                <button onClick={()=>{try{navigator.clipboard.writeText(excelData);}catch(e){}showT("CSV copiado");}} style={{background:"#10b981",color:"white",border:"none",borderRadius:7,padding:"6px 12px",fontWeight:700,cursor:"pointer",fontSize:12}}>Copiar CSV</button>
                <button onClick={()=>setShowExcel(false)} style={{background:"rgba(255,255,255,0.2)",color:"white",border:"none",borderRadius:7,padding:"6px 10px",fontWeight:700,cursor:"pointer",fontSize:12}}>Cerrar</button>
              </div>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{background:"#1e40af"}}>
                    {["Nombre","Estado","Frec.","Prestado","Cuota","Pagadas","Saldo","Ganancia","Inicio","Dia Cobro"].map((h,i)=>(
                      <th key={i} style={{color:"white",padding:"8px 10px",textAlign:"left",fontWeight:700,fontSize:11,whiteSpace:"nowrap",borderRight:"1px solid #1d4ed8"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {cl.map((c,i)=>{
                    const q=qR(c),saldo=cS(c);
                    const ganGen=Math.round(((q*c.cuotas-c.monto)/c.cuotas)*(c.historialPagos||[]).filter(f=>f).length);
                    const colEst=c.estado==="activo"?"#dcfce7":c.estado==="pagado"?"#dbeafe":c.estado==="perdida"?"#fee2e2":"#fef3c7";
                    const colTxt=c.estado==="activo"?"#166534":c.estado==="pagado"?"#1e40af":c.estado==="perdida"?"#991b1b":"#92400e";
                    return(
                      <tr key={i} style={{background:i%2===0?"white":"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
                        <td style={{padding:"7px 10px",fontWeight:600,color:"#0f172a",borderRight:"1px solid #e2e8f0"}}>{c.nombre}</td>
                        <td style={{padding:"7px 10px",borderRight:"1px solid #e2e8f0"}}><span style={{background:colEst,color:colTxt,borderRadius:12,padding:"2px 8px",fontSize:10,fontWeight:700}}>{c.estado}</span></td>
                        <td style={{padding:"7px 10px",color:"#475569",borderRight:"1px solid #e2e8f0"}}>{c.frecuencia}</td>
                        <td style={{padding:"7px 10px",fontWeight:700,color:"#0f172a",borderRight:"1px solid #e2e8f0"}}>{fC(c.monto)}</td>
                        <td style={{padding:"7px 10px",borderRight:"1px solid #e2e8f0"}}>{fC(q)}</td>
                        <td style={{padding:"7px 10px",textAlign:"center",borderRight:"1px solid #e2e8f0"}}>{c.cuotasPagadas}/{c.cuotas}</td>
                        <td style={{padding:"7px 10px",fontWeight:700,color:saldo>0?"#dc2626":"#16a34a",borderRight:"1px solid #e2e8f0"}}>{fC(saldo)}</td>
                        <td style={{padding:"7px 10px",fontWeight:700,color:"#16a34a",borderRight:"1px solid #e2e8f0"}}>{fC(ganGen)}</td>
                        <td style={{padding:"7px 10px",color:"#475569",fontSize:11,borderRight:"1px solid #e2e8f0"}}>{c.fechaInicio}</td>
                        <td style={{padding:"7px 10px",color:"#475569"}}>{c.diaCobro||"-"}</td>
                      </tr>
                    );
                  })}
                </tbody>
                <tfoot>
                  <tr style={{background:"#1e293b"}}>
                    <td style={{padding:"8px 10px",fontWeight:800,color:"white",fontSize:12}} colSpan={3}>TOTALES</td>
                    <td style={{padding:"8px 10px",fontWeight:800,color:"#fbbf24"}}>{fC(cl.reduce((s,c)=>s+c.monto,0))}</td>
                    <td></td><td></td>
                    <td style={{padding:"8px 10px",fontWeight:800,color:"#f87171"}}>{fC(cl.filter(c=>c.estado==="activo"||c.estado==="atrasado").reduce((s,c)=>s+cS(c),0))}</td>
                    <td style={{padding:"8px 10px",fontWeight:800,color:"#4ade80"}}>{fC(cl.reduce((s,c)=>{const q=qR(c);return s+Math.round(((q*c.cuotas-c.monto)/c.cuotas)*(c.historialPagos||[]).filter(f=>f).length);},0))}</td>
                    <td colSpan={2}></td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [trab,setTrab]=useState([]);
  const [oPin,setOPin]=useState("");
  const [loading,setLoading]=useState(true);
  const [vista,setVista]=useState(null);
  const [showPinMod,setShowPinMod]=useState(false);
  const [pinIn,setPinIn]=useState("");
  const [pinErr,setPinErr]=useState(false);
  const [pendV,setPendV]=useState(null);
  const [showOPin,setShowOPin]=useState(false);
  const [oPinStep,setOPinStep]=useState(1);
  const [oPinAct,setOPinAct]=useState("");
  const [oPinNew,setOPinNew]=useState("");
  const [oPinErr,setOPinErr]=useState(false);
  const [showModT,setShowModT]=useState(false);
  const [editT,setEditT]=useState(null);
  const [formT,setFormT]=useState({nombre:"",tipo:"porcentaje",porcentaje:"",sueldo:""});
  const [showReas,setShowReas]=useState(false);
  const [reasFrom,setReasFrom]=useState(null);
  const [storageMsg,setStorageMsg]=useState("");

  useEffect(()=>{
    (async()=>{
      try{const r=await gSt("mp_c_owner");if(r){const cl=JSON.parse(r);setStorageMsg(cl.length+" clientes");}else setStorageMsg("sin datos");}catch(e){setStorageMsg("error storage");}
      try{const r=await gSt("mp_trab_v1");if(r)setTrab(JSON.parse(r));}catch(e){}
      try{const r=await gSt("mp_opin_v1");if(r)setOPin(JSON.parse(r));}catch(e){}
      setLoading(false);
    })();
  },[]);

  async function saveTrab(u){setTrab(u);sSt("mp_trab_v1",JSON.stringify(u));}

  function tryEnter(vid){
    if(vid==="owner"){if(oPin&&oPin.trim()!==""){setPendV("owner");setPinIn("");setPinErr(false);setShowPinMod(true);}else setVista("owner");return;}
    const t=trab.find(x=>"w_"+x.id===vid);
    if(t&&t.pin&&t.pin.trim()!==""){setPendV(vid);setPinIn("");setPinErr(false);setShowPinMod(true);}else setVista(vid);
  }

  function confPin(){
    if(pendV==="owner"){if(pinIn===oPin){setVista("owner");setShowPinMod(false);setPendV(null);}else setPinErr(true);return;}
    const t=trab.find(x=>"w_"+x.id===pendV);
    if(t&&pinIn===t.pin){setVista(pendV);setShowPinMod(false);setPendV(null);}else setPinErr(true);
  }

  const tOpen=trab.find(t=>"w_"+t.id===vista);
  if(loading)return <div style={{background:"#0f172a",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#f59e0b",fontSize:18,fontFamily:"Georgia,serif"}}>Cargando...</div>;
  if(vista==="owner")return <Cartera ck="owner" nombre="Mi Cartera" CA="#f59e0b" onBack={()=>setVista(null)} allTrab={trab} saveTrab={saveTrab}/>;
  if(tOpen)return <Cartera ck={"worker_"+tOpen.id} nombre={"Cartera de "+tOpen.nombre} CA="#8b5cf6" onBack={()=>setVista(null)} allTrab={null} saveTrab={null}/>;

  return(
    <div style={{fontFamily:"Georgia,serif",background:"linear-gradient(180deg,#0a0f1e 0%,#0f172a 100%)",minHeight:"100vh",color:"#e2e8f0"}}>
      <div style={{background:"linear-gradient(135deg,#0f172a,#1e293b)",borderBottom:"1px solid #334155",padding:"0 14px",boxShadow:"0 2px 10px rgba(0,0,0,0.3)"}}>
        <div style={{maxWidth:900,margin:"0 auto",display:"flex",alignItems:"center",height:56,gap:9}}>
          <div style={{width:32,height:32,background:"linear-gradient(135deg,#f59e0b,#d97706)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>💰</div>
          <div><div style={{fontSize:14,fontWeight:700,color:"#f1f5f9"}}>MiPrestamo Pro</div><div style={{fontSize:9,color:"#64748b"}}>Gestion de Cartera</div></div>
        </div>
      </div>
      <div style={{maxWidth:900,margin:"0 auto",padding:"18px 14px"}}>
        <h2 style={{fontSize:17,fontWeight:700,color:"#f1f5f9",marginBottom:12}}>Carteras</h2>
        {storageMsg&&<div style={{fontSize:10,color:"#64748b",marginBottom:8,padding:"4px 8px",background:"#1e293b",borderRadius:6}}>{storageMsg}</div>}
        <div style={{background:"#1e293b",borderRadius:12,padding:14,border:"2px solid #f59e0b44",marginBottom:12,display:"flex",alignItems:"center",gap:11}}>
          <div onClick={()=>tryEnter("owner")} style={{display:"flex",alignItems:"center",gap:11,flex:1,cursor:"pointer"}}>
            <div style={{width:44,height:44,background:"linear-gradient(135deg,#f59e0b,#d97706)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,flexShrink:0}}>💰</div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:14,fontWeight:800,color:"#f1f5f9"}}>Mi Cartera</span>{oPin&&oPin.trim()!==""&&<span>🔐</span>}</div>
              <div style={{fontSize:10,color:"#64748b",marginTop:2}}>Tus clientes y prestamos</div>
            </div>
            <div style={{fontSize:15,color:"#f59e0b"}}>→</div>
          </div>
          <button onClick={()=>{setOPinStep(1);setOPinAct("");setOPinNew("");setOPinErr(false);setShowOPin(true);}} style={{background:"#334155",color:"#94a3b8",border:"none",borderRadius:6,padding:"5px 9px",fontSize:10,fontWeight:600,cursor:"pointer",flexShrink:0}}>{oPin&&oPin.trim()!==""?"PIN":"PIN"}</button>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
          <h3 style={{fontSize:12,fontWeight:700,color:"#94a3b8"}}>Trabajadores</h3>
          <button onClick={()=>{setEditT(null);setFormT({nombre:"",tipo:"porcentaje",porcentaje:"",sueldo:""});setShowModT(true);}} style={{background:"linear-gradient(135deg,#8b5cf6,#7c3aed)",color:"white",border:"none",borderRadius:7,padding:"6px 12px",fontWeight:700,cursor:"pointer",fontSize:11}}>+ Trabajador</button>
        </div>
        {trab.filter(t=>t.activo!==false).length===0&&<div style={{background:"#1e293b",borderRadius:10,padding:18,border:"1px dashed #334155",textAlign:"center",color:"#475569",marginBottom:11,fontSize:11}}>Sin trabajadores.</div>}
        <div style={{display:"grid",gap:8,marginBottom:14}}>
          {trab.filter(t=>t.activo!==false).map(t=>(
            <div key={t.id} style={{background:"#1e293b",borderRadius:10,border:"1px solid #8b5cf622"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 12px"}}>
                <div onClick={()=>tryEnter("w_"+t.id)} style={{display:"flex",alignItems:"center",gap:10,flex:1,cursor:"pointer"}}>
                  <div style={{width:38,height:38,background:"linear-gradient(135deg,#8b5cf6,#7c3aed)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:"white",fontSize:16,flexShrink:0}}>{t.nombre[0]}</div>
                  <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:5}}><span style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>{t.nombre}</span>{t.pin&&t.pin.trim()!==""&&<span style={{fontSize:10}}>🔐</span>}</div></div>
                  <div style={{fontSize:15,color:"#8b5cf6"}}>→</div>
                </div>
                <div style={{display:"flex",gap:4,flexShrink:0}}>
                  <button onClick={()=>{setEditT(t);setFormT({nombre:t.nombre,tipo:t.tipo,porcentaje:String(t.porcentaje),sueldo:fN(t.sueldo)});setShowModT(true);}} style={{background:"#334155",color:"#94a3b8",border:"none",borderRadius:6,padding:"4px 7px",fontSize:10,cursor:"pointer"}}>Editar</button>
                  <button onClick={()=>saveTrab(trab.map(x=>x.id===t.id?{...x,activo:false}:x))} style={{background:"#1e293b",color:"#f97316",border:"1px solid #f9731633",borderRadius:6,padding:"4px 7px",fontSize:10,cursor:"pointer"}}>Archivar</button>
                  <button onClick={()=>saveTrab(trab.filter(x=>x.id!==t.id))} style={{background:"#450a0a",color:"#ef4444",border:"none",borderRadius:6,padding:"4px 7px",fontSize:10,cursor:"pointer"}}>Borrar</button>
                </div>
              </div>
            </div>
          ))}
        </div>
        {trab.filter(t=>t.activo===false).length>0&&(
          <div style={{marginTop:14}}>
            <h3 style={{fontSize:10,fontWeight:700,color:"#475569",marginBottom:7,textTransform:"uppercase"}}>Archivados</h3>
            {trab.filter(t=>t.activo===false).map(t=>(
              <div key={t.id} style={{background:"#1e293b",borderRadius:9,border:"1px solid #33415533",padding:"9px 11px",display:"flex",alignItems:"center",gap:9,opacity:0.75,marginBottom:6}}>
                <div style={{flex:1}}><div style={{fontSize:11,fontWeight:700,color:"#94a3b8"}}>{t.nombre}</div></div>
                <div style={{display:"flex",gap:4}}>
                  <button onClick={()=>tryEnter("w_"+t.id)} style={{background:"#334155",color:"#94a3b8",border:"none",borderRadius:5,padding:"3px 7px",fontSize:10,cursor:"pointer"}}>Ver</button>
                  <button onClick={()=>saveTrab(trab.map(x=>x.id===t.id?{...x,activo:true}:x))} style={{background:"#052e16",color:"#10b981",border:"1px solid #10b98133",borderRadius:5,padding:"3px 7px",fontSize:10,cursor:"pointer"}}>Reactivar</button>
                  <button onClick={()=>{setReasFrom(t.id);setShowReas(true);}} style={{background:"#1e3a5f",color:"#3b82f6",border:"1px solid #3b82f633",borderRadius:5,padding:"3px 7px",fontSize:10,cursor:"pointer"}}>Reasignar</button>
                  <button onClick={()=>saveTrab(trab.filter(x=>x.id!==t.id))} style={{background:"#450a0a",color:"#ef4444",border:"none",borderRadius:5,padding:"3px 7px",fontSize:10,cursor:"pointer"}}>Borrar</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {showPinMod&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:13}}>
          <div style={{background:"#1e293b",borderRadius:14,padding:20,width:"100%",maxWidth:280,border:"1px solid #8b5cf6",textAlign:"center"}}>
            <div style={{fontSize:28,marginBottom:7}}>🔐</div>
            <h3 style={{fontSize:14,fontWeight:700,color:"#f1f5f9",marginBottom:11}}>Ingresa el PIN</h3>
            <input type="password" value={pinIn} onChange={e=>{setPinIn(e.target.value);setPinErr(false);}} onKeyDown={e=>e.key==="Enter"&&confPin()} maxLength={10} style={{width:"100%",background:"#0f172a",border:"1px solid "+(pinErr?"#ef4444":"#334155"),borderRadius:8,padding:"9px",color:"#f1f5f9",fontSize:20,textAlign:"center",letterSpacing:5,boxSizing:"border-box",outline:"none"}}/>
            {pinErr&&<div style={{fontSize:11,color:"#ef4444",marginTop:4}}>PIN incorrecto</div>}
            <div style={{display:"flex",gap:7,marginTop:10}}>
              <button onClick={()=>{setShowPinMod(false);setPendV(null);}} style={{flex:1,background:"#334155",color:"#94a3b8",border:"none",borderRadius:8,padding:"9px",fontWeight:600,cursor:"pointer",fontSize:12}}>Cancelar</button>
              <button onClick={confPin} style={{flex:2,background:"linear-gradient(135deg,#8b5cf6,#7c3aed)",color:"white",border:"none",borderRadius:8,padding:"9px",fontWeight:700,cursor:"pointer",fontSize:12}}>Entrar</button>
            </div>
          </div>
        </div>
      )}

      {showOPin&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:13}}>
          <div style={{background:"#1e293b",borderRadius:14,padding:20,width:"100%",maxWidth:290,border:"1px solid #f59e0b",textAlign:"center"}}>
            <div style={{fontSize:26,marginBottom:7}}>🔐</div>
            <h3 style={{fontSize:14,fontWeight:700,color:"#f1f5f9",marginBottom:11}}>PIN de Mi Cartera</h3>
            {oPin&&oPin.trim()!==""&&oPinStep===1&&(
              <div style={{textAlign:"left",marginBottom:11}}>
                <label style={{fontSize:10,color:"#94a3b8",display:"block",marginBottom:2,fontWeight:600}}>PIN actual</label>
                <input type="password" value={oPinAct} onChange={e=>{setOPinAct(e.target.value);setOPinErr(false);}} maxLength={10} style={{width:"100%",background:"#0f172a",border:"1px solid "+(oPinErr?"#ef4444":"#334155"),borderRadius:7,padding:"8px",color:"#f1f5f9",fontSize:16,textAlign:"center",letterSpacing:4,boxSizing:"border-box",outline:"none"}}/>
                {oPinErr&&<div style={{fontSize:10,color:"#ef4444",marginTop:2}}>PIN incorrecto</div>}
                <div style={{display:"flex",gap:7,marginTop:9}}>
                  <button onClick={()=>setShowOPin(false)} style={{flex:1,background:"#334155",color:"#94a3b8",border:"none",borderRadius:8,padding:"8px",fontWeight:600,cursor:"pointer",fontSize:12}}>Cancelar</button>
                  <button onClick={()=>{if(oPinAct===oPin){setOPinStep(2);setOPinErr(false);}else setOPinErr(true);}} style={{flex:2,background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"#0f172a",border:"none",borderRadius:8,padding:"8px",fontWeight:700,cursor:"pointer",fontSize:12}}>Continuar</button>
                </div>
              </div>
            )}
            {(oPinStep===2||!oPin||oPin.trim()==="")&&(
              <div style={{textAlign:"left"}}>
                <label style={{fontSize:10,color:"#94a3b8",display:"block",marginBottom:2,fontWeight:600}}>{oPin&&oPin.trim()!==""?"Nuevo PIN (vacio = quitar)":"PIN nuevo"}</label>
                <input type="password" value={oPinNew} onChange={e=>setOPinNew(e.target.value)} maxLength={10} style={{width:"100%",background:"#0f172a",border:"1px solid #f59e0b44",borderRadius:7,padding:"9px",color:"#f1f5f9",fontSize:18,textAlign:"center",letterSpacing:5,boxSizing:"border-box",outline:"none"}}/>
                <div style={{display:"flex",gap:7,marginTop:9}}>
                  <button onClick={()=>setShowOPin(false)} style={{flex:1,background:"#334155",color:"#94a3b8",border:"none",borderRadius:8,padding:"8px",fontWeight:600,cursor:"pointer",fontSize:12}}>Cancelar</button>
                  <button onClick={async()=>{setOPin(oPinNew);sSt("mp_opin_v1",JSON.stringify(oPinNew));setShowOPin(false);setOPinStep(1);setOPinNew("");setOPinAct("");}} style={{flex:2,background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"#0f172a",border:"none",borderRadius:8,padding:"8px",fontWeight:700,cursor:"pointer",fontSize:12}}>{oPinNew.trim()===""?"Quitar PIN":"Guardar PIN"}</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {showModT&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:13}}>
          <div style={{background:"#1e293b",borderRadius:14,padding:18,width:"100%",maxWidth:330,border:"1px solid #8b5cf6"}}>
            <h3 style={{fontSize:14,fontWeight:700,color:"#f1f5f9",marginBottom:11}}>{editT?"Editar":"Nuevo"} Trabajador</h3>
            <div style={{display:"grid",gap:9}}>
              <div><label style={{fontSize:10,color:"#94a3b8",display:"block",marginBottom:2,fontWeight:600}}>Nombre</label><input type="text" value={formT.nombre} onChange={e=>setFormT(p=>({...p,nombre:e.target.value}))} style={INP}/></div>
              <div><label style={{fontSize:10,color:"#94a3b8",display:"block",marginBottom:2,fontWeight:600}}>Modalidad</label><select value={formT.tipo} onChange={e=>setFormT(p=>({...p,tipo:e.target.value}))} style={{...INP,cursor:"pointer"}}><option value="porcentaje">Porcentaje de ganancia</option><option value="sueldo">Sueldo fijo</option></select></div>
              {formT.tipo==="porcentaje"?<div><label style={{fontSize:10,color:"#94a3b8",display:"block",marginBottom:2,fontWeight:600}}>Porcentaje (%)</label><input type="number" value={formT.porcentaje} onChange={e=>setFormT(p=>({...p,porcentaje:e.target.value}))} placeholder="Ej: 30" style={INP}/></div>:<div><label style={{fontSize:10,color:"#94a3b8",display:"block",marginBottom:2,fontWeight:600}}>Sueldo ($)</label><input type="text" inputMode="numeric" value={formT.sueldo} onChange={e=>{const r=pN(e.target.value);setFormT(p=>({...p,sueldo:r?fN(r):""}));}} style={INP}/></div>}
            </div>
            <div style={{display:"flex",gap:7,marginTop:11}}>
              <button onClick={()=>{setShowModT(false);setEditT(null);}} style={{flex:1,background:"#334155",color:"#94a3b8",border:"none",borderRadius:8,padding:"8px",fontWeight:600,cursor:"pointer",fontSize:12}}>Cancelar</button>
              <button onClick={()=>{if(!formT.nombre.trim())return;const t={...formT,porcentaje:Number(formT.porcentaje)||0,sueldo:pN(formT.sueldo)||0,pin:editT?editT.pin||"":"",id:editT?editT.id:Date.now(),activo:true};saveTrab(editT?trab.map(x=>x.id===editT.id?t:x):[...trab,t]);setShowModT(false);setEditT(null);setFormT({nombre:"",tipo:"porcentaje",porcentaje:"",sueldo:""}); }} style={{flex:2,background:"linear-gradient(135deg,#8b5cf6,#7c3aed)",color:"white",border:"none",borderRadius:8,padding:"8px",fontWeight:700,cursor:"pointer",fontSize:12}}>{editT?"Guardar":"Crear"}</button>
            </div>
          </div>
        </div>
      )}

      {showReas&&reasFrom&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:13}}>
          <div style={{background:"#1e293b",borderRadius:14,padding:18,width:"100%",maxWidth:350,border:"1px solid #f59e0b"}}>
            <h3 style={{fontSize:14,fontWeight:700,color:"#f1f5f9",marginBottom:5}}>Reasignar clientes</h3>
            <div style={{display:"grid",gap:7}}>
              {[{id:"owner",label:"Mi Cartera",col:"#f59e0b"},...trab.filter(t=>t.activo!==false&&t.id!==reasFrom).map(t=>({id:"w_"+t.id,label:t.nombre,col:"#8b5cf6"}))].map(d=>(
                <button key={d.id} onClick={async()=>{
                  const srcKey="mp_c_worker_"+reasFrom;
                  const srcR=await gSt(srcKey);const srcC=srcR?JSON.parse(srcR):[];
                  const activos=srcC.filter(c=>c.estado==="activo"||c.estado==="atrasado");
                  const resto=srcC.filter(c=>c.estado!=="activo"&&c.estado!=="atrasado");
                  sSt(srcKey,JSON.stringify(resto));
                  const destKey=d.id==="owner"?"mp_c_owner":"mp_c_worker_"+d.id.replace("w_","");
                  const destR=await gSt(destKey);const destC=destR?JSON.parse(destR):[];
                  sSt(destKey,JSON.stringify([...destC,...activos]));
                  setShowReas(false);setReasFrom(null);
                }} style={{background:"#0f172a",border:"1px solid "+d.col+"44",borderRadius:7,padding:"9px 12px",color:"#f1f5f9",fontSize:12,fontWeight:600,cursor:"pointer",textAlign:"left"}}>
                  <span style={{color:d.col,marginRight:6}}>→</span>{d.label}
                </button>
              ))}
            </div>
            <button onClick={()=>{setShowReas(false);setReasFrom(null);}} style={{width:"100%",background:"#334155",color:"#94a3b8",border:"none",borderRadius:8,padding:"8px",fontWeight:600,cursor:"pointer",fontSize:12,marginTop:9}}>Cancelar</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
