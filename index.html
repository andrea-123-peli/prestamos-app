const fm  = v => '$' + Math.round(v||0).toLocaleString('es-CO');
const hoy = () => new Date().toISOString().slice(0,10);
const uid = () => 'x' + Date.now() + Math.floor(Math.random()*9999);
const fDT = s => { try { const d=new Date(s); return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes()); } catch(e){ return ''; } };
const fD  = s => { try { const d=new Date(s+'T12:00:00'); return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear(); } catch(e){ return s||''; } };
const fT  = s => { try { const d=new Date(s); const hoy2=new Date(); const esHoy=d.getDate()===hoy2.getDate()&&d.getMonth()===hoy2.getMonth(); return (esHoy?'':pad(d.getDate())+'/'+pad(d.getMonth()+1)+' ')+pad(d.getHours())+':'+pad(d.getMinutes()); } catch(e){ return ''; } };
const pad = n => String(n).padStart(2,'0');
const semana = () => {
  const d=new Date(), dy=d.getDay(), diff=d.getDate()-dy+(dy===0?-6:1);
  const lu=new Date(d.getFullYear(),d.getMonth(),diff);
  const do2=new Date(lu.getTime()+6*86400000);
  const f=x=>x.getFullYear()+'-'+pad(x.getMonth()+1)+'-'+pad(x.getDate());
  return { ini: f(lu), fin: f(do2) };
};
const NM = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

// ── DATOS BASE ─────────────────────────────────────────
const CATS = ['Aceites','Filtros','Frenos','Transmision','Electricidad','Carburacion','Suspension','Llantas','Motor','Rodamientos','Escape','Carroceria','Lubricantes','Accesorios','Otros','-- Nueva categoria --'];
const PAGOS = ['Efectivo','Transferencia','Nequi','Daviplata','Fiado','Tarjeta'];
const SERVT = ['Cambio de aceite','Mantenimiento general','Revision de frenos','Ajuste de carburador','Cambio de cadena','Revision electrica','Cambio de llantas','Lavado de moto','Diagnostico','Servicio personalizado'];
const BASE_INV = [];

// ── COLORES ────────────────────────────────────────────
const C = {
  bg:'#0d0f14', su:'#161923', ca:'#1e2433', bo:'#2a3045',
  or:'#ff6b1a', gr:'#22c55e', re:'#ef4444', bl:'#3b82f6',
  ye:'#fbbf24', pu:'#a855f7', cy:'#06b6d4', tx:'#e8ecf4', mu:'#6b7591'
};

// ── COMPONENTES UI ─────────────────────────────────────
const Btn = ({onClick,ch,col=C.or,sm,full,style={}}) => (
  <button onClick={onClick} style={{
    background: col==='ghost'?'transparent':col,
    color: col==='ghost'?C.tx : col===C.gr?'#000':'#fff',
    border: col==='ghost'?`1px solid ${C.bo}`:'none',
    borderRadius:8, padding:sm?'6px 10px':'10px 16px',
    fontSize:sm?10:12, fontWeight:700, cursor:'pointer',
    display:'inline-flex', alignItems:'center', gap:6,
    width:full?'100%':'auto', justifyContent:full?'center':'flex-start',
    ...style
  }}>{ch}</button>
);

const fmtNum = v => {
  const n = parseFloat(String(v).replace(/\./g,''));
  return isNaN(n) ? '' : n.toLocaleString('es-CO');
};
const Inp = ({v,s,ph,type='text',style={}}) => (
  <div style={{position:'relative'}}>
    <input value={v} onChange={e=>s(e.target.value)} placeholder={ph} type={type}
      style={{width:'100%',background:C.su,border:`1px solid ${C.bo}`,borderRadius:8,
        color:C.tx,fontSize:14,padding:'10px 12px',outline:'none',...style}}/>
    {type==='number'&&v&&parseFloat(v)>999&&(
      <div style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',
        fontSize:11,color:C.or,fontWeight:700,pointerEvents:'none',background:C.su,padding:'0 4px'}}>
        {fmtNum(v)}
      </div>
    )}
  </div>
);

const Sel = ({v,s,opts}) => (
  <select value={v} onChange={e=>s(e.target.value)}
    style={{width:'100%',background:C.su,border:`1px solid ${C.bo}`,borderRadius:8,
      color:C.tx,fontSize:14,padding:'10px 12px',outline:'none'}}>
    {opts.map(o=><option key={o}>{o}</option>)}
  </select>
);

const CatSel = ({v,s}) => {
  const NUEVA = '-- Nueva categoria --';
  const esNueva = v===NUEVA || !CATS.includes(v);
  return (
    <div>
      <select value={esNueva&&v!==NUEVA?NUEVA:v} onChange={e=>s(e.target.value===NUEVA?'':e.target.value)}
        style={{width:'100%',background:C.su,border:`1px solid ${C.bo}`,borderRadius:8,
          color:C.tx,fontSize:14,padding:'10px 12px',outline:'none',marginBottom:esNueva?8:0}}>
        {CATS.map(o=><option key={o}>{o}</option>)}
      </select>
      {esNueva && <Inp v={v===NUEVA?'':v} s={s} ph="Escribe la categoria..."/>}
    </div>
  );
};

const FG = ({lbl,ch}) => (
  <div style={{marginBottom:12}}>
    <div style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:'uppercase',color:C.mu,marginBottom:5}}>{lbl}</div>
    {ch}
  </div>
);

const Card = ({ch,style={}}) => (
  <div style={{background:C.ca,border:`1px solid ${C.bo}`,borderRadius:12,padding:16,marginBottom:14,...style}}>{ch}</div>

const Grafica = ({ven}) => {
  const ref = useRef();
  useEffect(()=>{
    const canvas=ref.current; if(!canvas) return;
    const now=new Date(); const meses={}; const keys=[];
    for(let i=5;i>=0;i--){
      const d=new Date(now.getFullYear(),now.getMonth()-i,1);
      const k=d.getFullYear()+'-'+pad(d.getMonth()+1);
      meses[k]={v:0,g:0,lbl:NM[d.getMonth()]}; keys.push(k);
    }
    ven.forEach(v=>{ const k=v.fecha.slice(0,7); if(meses[k]){meses[k].v+=v.total;meses[k].g+=v.ganancia;} });
    const W=canvas.offsetWidth||400,H=200; canvas.width=W; canvas.height=H;
    const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,W,H);
    const PL=52,PR=16,PT=16,PB=36,GW=W-PL-PR,GH=H-PT-PB,n=keys.length;
    let maxV=1; keys.forEach(k=>{if(meses[k].v>maxV)maxV=meses[k].v;});
    for(let j=0;j<=4;j++){
      const y=PT+GH-(j/4)*GH;
      ctx.strokeStyle='#2a3045';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(PL+GW,y);ctx.stroke();
      ctx.fillStyle='#6b7591';ctx.font='10px Arial';ctx.textAlign='right';
      ctx.fillText('$'+Math.round((j/4)*maxV/1000)+'k',PL-5,y+3);
    }
    const bw=GW/n*.28,gap=GW/n;
    keys.forEach((k,i)=>{
      const x=PL+i*gap+gap/2;
      const hv=meses[k].v/maxV*GH, hg=meses[k].g/maxV*GH;
      ctx.fillStyle='rgba(59,130,246,.8)'; ctx.fillRect(x-bw-1,PT+GH-hv,bw,hv);
      ctx.fillStyle='rgba(34,197,94,.85)'; ctx.fillRect(x+1,PT+GH-hg,bw,hg);
      ctx.fillStyle='#8892aa';ctx.font='10px Arial';ctx.textAlign='center';
      ctx.fillText(meses[k].lbl,x,H-PB+14);
    });
  },[ven]);
  return (
    <div>
      <canvas ref={ref} style={{width:'100%',display:'block'}}/>
      <div style={{marginTop:8,fontSize:11,color:C.mu,textAlign:'center'}}>
        <span style={{color:C.bl,fontWeight:700}}>■</span> Ventas &nbsp;
        <span style={{color:C.gr,fontWeight:700}}>■</span> Ganancia
      </div>
    </div>
  );
};

                    {[{id:'todo',lbl:'🏪 Todo',col:C.or},{id:'repuestos',lbl:'🔩 Repuestos',col:C.bl},{id:'lavadero',lbl:'🚿 Lavadero',col:C.cy},{id:'empleados',lbl:'🔧 Taller',col:C.gr}].map(o=>(
                      <button key={o.id} onClick={()=>setHTipo(o.id)} style={{
                        background:hTipo===o.id?o.col:'transparent',

                    <div style={{fontSize:10,color:C.mu,textTransform:'uppercase',marginBottom:6}}>🔩 Repuestos</div>
                    <div style={{fontSize:18,fontWeight:800,color:C.bl}}>{fm(tRep.reduce((a,b)=>a+b.total,0))}</div>

                    <div style={{fontSize:10,color:C.mu,textTransform:'uppercase',marginBottom:6}}>🚿 Lavadero</div>
                    <div style={{fontSize:18,fontWeight:800,color:C.cy}}>{fm(tLav.reduce((a,b)=>a+b.total,0))}</div>
                    <div style={{fontSize:11,color:C.mu,marginTop:4}}>Ganancia: {fm(tLav.reduce((a,b)=>a+b.ganancia,0))}</div>

                  <div style={{background:C.ca,border:`1px solid ${C.bo}`,borderTop:`3px solid ${C.gr}`,borderRadius:12,padding:14}}>

                    <div style={{fontSize:18,fontWeight:800,color:C.gr}}>{fm(tEmp.reduce((a,b)=>a+b.total,0))}</div>
                    <div style={{fontSize:11,color:C.mu,marginTop:4}}>Ganancia: {fm(tEmp.reduce((a,b)=>a+b.ganancia,0))}</div>

                <KPI lbl="Ganancia" val={fm(htg)}         col={C.or}/>
                <KPI lbl="Gastos"   val={fm(htga)}        col={C.re}/>

              <Card ch={
                <div style={{overflowX:'auto'}}>

                              </div>

                        </tr>

            </div>

        {/* ╔══════════════════════════════╗ */}
        {/* ║         EMPLEADOS            ║ */}
        {/* ╚══════════════════════════════╝ */}
        {tab==='empleados'&&(
          <div>

            <div style={{background:'rgba(59,130,246,.08)',border:`1px solid ${C.bl}`,borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:12,color:C.mu}}>
              💡 El porcentaje de cada tecnico se configura en su tarjeta individual.
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
              {/* Formulario */}
              <Card ch={
                <div>
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',color:C.mu,marginBottom:12}}>➕ Registrar Produccion</div>

                    <div>
                      <select value={epEmp} onChange={e=>setEpEmp(e.target.value)}

                        {emps.map(e2=><option key={e2.nom} value={e2.nom}>{e2.nom} ({e2.pct}%)</option>)}

                    </div>

                  <FG lbl="Fecha" ch={<Inp v={epFecha||hoy()} s={setEpFecha} type="date"/>}/>
                  <Btn onClick={()=>{
                    if(!epEmp) return toast2('Selecciona un empleado','err');
                    if(!epDesc.trim()) return toast2('Escribe el servicio realizado','err');
                    const val2=parseFloat(epVal);
                    if(!val2) return toast2('Ingresa el valor','err');
                    const empObj=emps.find(e=>e.nom===epEmp);
                    const pct=empObj?empObj.pct:60;
                    const prod={id:uid(),fecha:epFecha||hoy(),empleado:epEmp,
                      servicio:epDesc.trim(),desc:epDesc.trim(),pct,valor:val2,
                      emp60:Math.round(val2*(pct/100)),neg40:Math.round(val2*((100-pct)/100))};
                    sEmpProd([...rEmpProd.current,prod]);
                    sVen([...rVen.current,{id:prod.id+'e',fecha:new Date(prod.fecha+'T12:00:00').toISOString(),
                      tipo:'empleado',cliente:'Taller',desc:'🔧 '+epDesc+' - '+epEmp,
                      total:val2,ganancia:prod.neg40,pago:'Efectivo',items:[]}]);
                    setEpVal('');setEpDesc('');
                    toast2('Produccion de '+fm(val2)+' registrada para '+epEmp,'ok');
                  }} col={C.gr} full ch="✅ Registrar Produccion"/>
                </div>
              }/>

              {/* Lista empleados */}
              <div>
                <Card ch={
                  <div>
                    <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',color:C.mu,marginBottom:10}}>🔧 Mis Tecnicos</div>

                      <Inp v={epNomNuevo} s={setEpNomNuevo} ph="Nombre del tecnico..."/>

                        if(!epNomNuevo.trim()) return toast2('Escribe el nombre','err');
                        if(emps.find(e=>e.nom===epNomNuevo.trim())) return toast2('Ya existe','err');
                        sEmps([...emps,{nom:epNomNuevo.trim(),pct:60}]);

                      }} ch="+ Agregar"/>
                    </div>
                    {!emps.length&&<div style={{textAlign:'center',padding:12,color:C.mu,fontSize:12}}>Sin tecnicos registrados</div>}
                    <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                      {emps.map(e2=>(
                        <div key={e2.nom} style={{background:C.su,border:`1px solid ${C.bo}`,borderRadius:8,padding:'6px 12px',display:'flex',alignItems:'center',gap:8}}>
                          <span style={{fontWeight:600,fontSize:13}}>{e2.nom}</span>
                          <span style={{fontSize:11,color:C.or}}>{e2.pct}%</span>
                        </div>

                    </div>
                  </div>

                          style={{width:60,background:'transparent',border:`1px solid ${C.or}`,borderRadius:6,color:C.or,fontSize:16,fontWeight:800,textAlign:'center',padding:'2px 6px',outline:'none'}}/>

                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:10}}>

                          {lbl:'Este mes',val:tM,col:C.or},

                                </div>
                              </div>

                                <div style={{fontSize:11,color:C.cy,fontWeight:700}}>💰 Pago a {e2.nom}</div>

                                <div style={{background:C.su,borderRadius:8,padding:'8px 12px',marginBottom:8}}>
                                  <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
                                    <span style={{color:C.mu}}>🔧 Produccion semana ({e2.pct}% de {fm(tS)})</span>
                                    <span style={{color:C.gr,fontWeight:700}}>{fm(pagoSem)}</span>

                                  {totalAdel>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3,borderTop:`1px solid ${C.bo}`,paddingTop:4}}>
                                    <span style={{color:C.mu}}>Adelantos a descontar</span>
                                    <span style={{color:C.re,fontWeight:700}}>-{fm(totalAdel)}</span>
                                  </div>}
                                  <div style={{display:'flex',justifyContent:'space-between',fontSize:15,fontWeight:800,borderTop:`1px solid ${C.bo}`,paddingTop:6,marginTop:4}}>
                                    <span>Total a pagar</span>
                                    <span style={{color:C.gr}}>{fm(pagoReal)}</span>
                                  </div>
                                </div>
                              </div>
                              <Btn sm col={C.gr} onClick={()=>{
                                // Produccion lavadero de esta semana
                                sEmp([...rEmp.current,{id:uid(),fecha:hoy(),nombre:e2.nom,cargo:'Taller',periodo:sem.ini+' al '+sem.fin,monto:pagoReal,pago:'Efectivo'}]);

                                sAdelantos(rAdelantos.current.map(a=>a.nom===e2.nom&&!a.pagado?{...a,pagado:true}:a));

                              }} ch="✅ Registrar pago"/>
                            </div>
                          </div>
                        );
                      })()}
                    </div>
                  );
                })}

                  }).map(p=>({...p,tipo:'🔧 Taller'})).sort((a,b)=>b.fecha.localeCompare(a.fecha));

                  const filPend=fil.filter(p=>!p.pagado);
                  const tot60Bruto=filPend.reduce((a,b)=>a+(b.emp60||0),0);
                  // Descontar adelantos pendientes de los empleados en el filtro
                  const empsEnFil=[...new Set(filPend.map(p=>p.empleado))];
                  const adelPendFil=adelantos.filter(a=>!a.pagado&&(!a.tipo||a.tipo==='taller')&&empsEnFil.includes(a.nom)).reduce((a,b)=>a+b.monto,0);

                  const tot40=fil.reduce((a,b)=>a+b.neg40,0);
                  const porEmp={};
                  fil.forEach(p=>{if(!porEmp[p.empleado])porEmp[p.empleado]={val:0,emp60:0,neg40:0};porEmp[p.empleado].val+=p.valor;porEmp[p.empleado].emp60+=p.emp60;porEmp[p.empleado].neg40+=p.neg40;});

                        </div>
                        <div style={{background:'rgba(255,107,26,.1)',borderRadius:8,padding:12,textAlign:'center'}}><div style={{fontSize:10,color:C.mu,textTransform:'uppercase',marginBottom:4}}>Para el Negocio</div><div style={{fontSize:22,fontWeight:800,color:C.or}}>{fm(tot40)}</div></div>
                      </div>
                      {Object.keys(porEmp).length>1&&(
                        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}}>
                          {Object.entries(porEmp).map(([nom,d2])=>(

                              <div style={{fontSize:12,color:C.bl,fontWeight:700}}>{fm(d2.val)}</div>
                              <div style={{fontSize:11,color:C.gr}}>Empleado: {fm(d2.emp60)}</div>
                              <div style={{fontSize:11,color:C.or}}>Negocio: {fm(d2.neg40)}</div>
                            </div>
                          ))}
                        </div>
                      )}
                      <div style={{overflowX:'auto'}}>
                        <table style={{width:'100%',borderCollapse:'collapse'}}>
                          <thead><tr><TH ch="Fecha"/><TH ch="Empleado"/><TH ch="Servicio"/><TH ch="Total"/><TH ch="% Empleado"/><TH ch="% Negocio"/><TH ch=""/></tr></thead>

                            {fil.map((p,i)=>(
                              <tr key={i} style={{borderBottom:`1px solid ${C.bo}`}}>
                                <TD style={{fontSize:12,color:C.mu,whiteSpace:'nowrap'}} ch={p.fecha}/>
                                <TD style={{fontWeight:700,color:C.bl}} ch={p.empleado}/>
                                <TD style={{fontSize:12}} ch={<span>{p.desc}{p.pagado&&<span style={{fontSize:10,color:C.gr,marginLeft:6}}>✓ pagado</span>}</span>}/>
                                <TD style={{fontWeight:700}} ch={fm(p.valor)}/>
                                <TD style={{color:C.gr,fontWeight:700}} ch={fm(p.emp60)+' ('+p.pct+'%)'}/>
                                <TD style={{color:C.or,fontWeight:700}} ch={fm(p.neg40)+' ('+(100-p.pct)+'%)'}/>
                                <TD ch={<Btn sm col={C.re} onClick={()=>{if(!confirm('¿Seguro?'))return;sEmpProd(empProd.filter(x=>x.id!==p.id));sVen(ven.filter(v=>v.id!==p.id+'e'));toast2('Eliminado','info');}} ch="🗑"/>}/>
                              </tr>
                            ))}
                            {!fil.length&&<tr><td colSpan={7} style={{textAlign:'center',padding:28,color:C.mu}}>Sin producciones para este filtro</td></tr>}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  );
                })()}
              </div>
            }/>
          </div>

        const tieneIva=ticket.iva>0;

        <div id="facturaPrint" style={{background:'#fff',color:'#1a1a1a',padding:24,borderRadius:8,fontFamily:'Arial,sans-serif'}}>

                <div style={{fontSize:10,color:'#666'}}>Repuestos y Servicio Tecnico</div>

              {ticket.clienteNit&&<div style={{fontSize:11,color:'#666'}}>NIT: {ticket.clienteNit}</div>}

                  <td style={{fontSize:12,padding:'8px 6px',textAlign:'right'}}>{fm(it.pv)}</td>
                  <td style={{fontSize:12,padding:'8px 6px',textAlign:'right',fontWeight:700}}>{fm(it.pv*it.cant)}</td>
                </tr>
              ))}
            </tbody>
          </table>

          {/* Totales */}
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:14}}>
            <div style={{width:220}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'4px 0'}}>
                <span style={{color:'#666'}}>Subtotal</span>
                <span style={{fontWeight:600}}>{fm(subtotal)}</span>

              window.open('https://wa.me/?text='+encodeURIComponent(txt));

            <Btn onClick={()=>{

            <div style={{fontSize:13,fontWeight:700,color:C.tx,marginBottom:8}}>📤 Exportar — Guardar mis datos</div>
            <div style={{fontSize:12,color:C.mu,marginBottom:10}}>Descarga un archivo con todos tus datos actuales. Guárdalo en tu teléfono o en WhatsApp contigo mismo.</div>
           <Btn onClick={exportarDatos} col={C.gr} full ch="📥 Descargar archivo de backup"/>           </div>           <div style={{height:1,background:C.bo,margin:'16px 0'}}/>           <div>             <div style={{fontSize:13,fontWeight:700,color:C.tx,marginBottom:8}}>📊 Exportar a Excel para contabilidad</div>             <div style={{fontSize:12,color:C.mu,marginBottom:10}}>Exporta ventas, gastos, compras y nómina en un período específico.</div>             <div style={{display:'flex',gap:10,marginBottom:10,flexWrap:'wrap'}}>               <div style={{flex:1}}><div style={{fontSize:10,color:C.mu,textTransform:'uppercase',marginBottom:4}}>Desde</div><input type="date" id="exDe" style={{width:'100%',background:C.su,border:'1px solid '+C.bo,borderRadius:8,color:C.tx,fontSize:14,padding:'8px 12px',outline:'none'}}/></div>               <div style={{flex:1}}><div style={{fontSize:10,color:C.mu,textTransform:'uppercase',marginBottom:4}}>Hasta</div><input type="date" id="exHa" style={{width:'100%',background:C.su,border:'1px solid '+C.bo,borderRadius:8,color:C.tx,fontSize:14,padding:'8px 12px',outline:'none'}}/></div>             </div>             <Btn onClick={()=>{const de=document.getElementById('exDe').value;const ha=document.getElementById('exHa').value;exportarExcel(de,ha);}} col={C.bl} full ch="📊 Exportar a Excel"/>           </div>

          <div style={{height:1,background:C.bo,marginBottom:20}}/>

          <div>
            <div style={{fontSize:13,fontWeight:700,color:C.tx,marginBottom:8}}>📂 Importar — Cargar datos guardados</div>
            <div style={{fontSize:12,color:C.mu,marginBottom:10}}>Pega aquí el contenido de tu archivo de backup para restaurar los datos.</div>
            <textarea value={importTxt} onChange={e=>setImportTxt(e.target.value)}
              placeholder="Pega aquí el contenido del archivo backup..."
              style={{width:'100%',height:100,background:C.su,border:`1px solid ${C.bo}`,borderRadius:8,
                color:C.tx,fontSize:12,padding:'10px 12px',outline:'none',resize:'vertical',marginBottom:10}}/>
            <Btn onClick={importarDatos} col={C.bl} full ch="📂 Importar datos"/>
          </div>
        </div>
      }/>

      {/* Toast */}
      {toast.msg&&(
        <div style={{position:'fixed',bottom:20,right:16,background:C.ca,
          border:`1px solid ${C.bo}`,
          borderLeft:`4px solid ${toast.type==='err'?C.re:toast.type==='info'?C.bl:C.gr}`,
          borderRadius:10,padding:'12px 16px',fontSize:13,fontWeight:600,zIndex:999,
          maxWidth:280,boxShadow:'0 8px 24px rgba(0,0,0,.6)'}}>
          {toast.type==='err'?'❌ ':toast.type==='info'?'ℹ️ ':'✅ '}{toast.msg}
        </div>
      )}

    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
